##############################################################################
#  Strava Data Sync
#  ─────────────────────────────────────────────────────────────────────────
#  Refreshes public/strava-data.json every 6 hours and on manual trigger.
#  The deploy workflow auto-runs afterward because it watches `main`.
#
#  ONE-TIME SETUP — do this once, then forget about it:
#
#  1. Go to https://www.strava.com/settings/api and create an app:
#       Application Name : Noah's Website (or anything)
#       Category         : Other
#       Website          : your site URL
#       Authorization Callback Domain : localhost
#     Note your Client ID and Client Secret.
#
#  2. Open this URL in your browser (replace YOUR_CLIENT_ID):
#       https://www.strava.com/oauth/authorize?client_id=YOUR_CLIENT_ID
#         &redirect_uri=http://localhost&response_type=code
#         &scope=read,activity:read_all
#     Approve access. You'll land on a localhost URL — grab the `code` param.
#
#  3. Exchange the code for a refresh token (run in terminal, replace values):
#       curl -X POST https://www.strava.com/oauth/token \
#         -F client_id=YOUR_CLIENT_ID \
#         -F client_secret=YOUR_CLIENT_SECRET \
#         -F code=THE_CODE_FROM_STEP_2 \
#         -F grant_type=authorization_code
#     Copy the `refresh_token` value from the JSON response.
#
#  4. Add three GitHub Secrets (repo → Settings → Secrets → Actions):
#       STRAVA_CLIENT_ID      ← from step 1
#       STRAVA_CLIENT_SECRET  ← from step 1
#       STRAVA_REFRESH_TOKEN  ← from step 3
#
#  5. Run this workflow manually once (Actions tab → "Strava Data Sync" → Run).
##############################################################################

name: Strava Data Sync

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v7

      - name: Refresh Strava access token
        id: auth
        run: |
          RESP=$(curl -s -X POST https://www.strava.com/oauth/token \
            -F client_id="${{ secrets.STRAVA_CLIENT_ID }}" \
            -F client_secret="${{ secrets.STRAVA_CLIENT_SECRET }}" \
            -F grant_type=refresh_token \
            -F refresh_token="${{ secrets.STRAVA_REFRESH_TOKEN }}")
          echo "token=$(echo "$RESP" | jq -r '.access_token')" >> "$GITHUB_OUTPUT"
          echo "athlete=$(echo "$RESP" | jq -r '.athlete.id')" >> "$GITHUB_OUTPUT"

      - name: Fetch athlete, stats, and activities
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
          AID:   ${{ steps.auth.outputs.athlete }}
        run: |
          ATHLETE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            https://www.strava.com/api/v3/athlete)

          STATS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://www.strava.com/api/v3/athletes/${AID}/stats")

          ACTIVITIES=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://www.strava.com/api/v3/athlete/activities?per_page=20&page=1")

          jq -n \
            --argjson athlete    "$ATHLETE" \
            --argjson stats      "$STATS" \
            --argjson activities "$ACTIVITIES" \
            --arg     updated    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              athlete: {
                firstname: $athlete.firstname,
                lastname:  $athlete.lastname,
                city:      $athlete.city,
                profile:   $athlete.profile
              },
              stats: {
                ytd_run_totals:    $stats.ytd_run_totals,
                ytd_ride_totals:   $stats.ytd_ride_totals,
                all_run_totals:    $stats.all_run_totals
              },
              activities: $activities,
              updated_at: $updated
            }' > public/strava-data.json

      - name: Enrich activities with photos
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cat > /tmp/fetch_photos.py << 'PYEOF'
          import json, urllib.request, os, sys

          sys.stdout.reconfigure(encoding='utf-8')
          token = os.environ["TOKEN"]

          def fetch(url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"Warning: {url} — {e}", file=sys.stderr)
                  return []

          with open("public/strava-data.json") as f:
              data = json.load(f)

          def collect_photos_from_activities(activities, all_photos):
              for act in activities:
                  if act.get("total_photo_count", 0) > 0:
                      photos = fetch(
                          f"https://www.strava.com/api/v3/activities/{act['id']}/photos"
                          f"?size=1200&photo_sources=true"
                      )
                      for p in photos:
                          url = p.get("urls", {}).get("1200", "")
                          if url:
                              all_photos.append({
                                  "url": url,
                                  "activity_name": act["name"],
                                  "activity_date": act["start_date"],
                                  "activity_type": act.get("sport_type", act.get("type", "Activity")),
                              })

          all_photos = []
          seen_ids = {act["id"] for act in data.get("activities", [])}

          # Photos from the 20 activities already in the data
          collect_photos_from_activities(data.get("activities", []), all_photos)

          # Scan additional pages for more photos (up to 200 extra activities)
          for page in range(2, 12):
              if len(all_photos) >= 60:
                  break
              extra = fetch(
                  f"https://www.strava.com/api/v3/athlete/activities?per_page=20&page={page}"
              )
              if not extra:
                  break
              new_acts = [a for a in extra if a["id"] not in seen_ids]
              collect_photos_from_activities(new_acts, all_photos)
              seen_ids.update(a["id"] for a in extra)

          data["photos"] = all_photos
          print(f"Collected {len(all_photos)} photos", file=sys.stderr)

          with open("public/strava-data.json", "w") as f:
              json.dump(data, f)
          PYEOF
          python3 /tmp/fetch_photos.py

      - name: Commit and trigger deploy if data changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/strava-data.json
          if git diff --staged --quiet; then
            echo "No new data — skipping commit and deploy."
          else
            git commit -m "chore: update Strava data"
            git push
            # GITHUB_TOKEN pushes don't auto-trigger other workflows, so kick off
            # the deploy explicitly.
            gh workflow run deploy.yml --ref main
            echo "Deploy triggered."
          fi
